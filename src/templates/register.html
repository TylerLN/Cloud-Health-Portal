<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Register</title>
    <link rel="stylesheet" href="../static/login.css" />
  </head>

  <body>
    <div class="main-container">
      <div class="login">
        <h1>Medical Health Portal</h1>
        <h3>Create your account</h3>

        <form action="/register" method="POST" class="login-form">
          <input type="text" name="username" placeholder="Username" required />

          <input
            type="password"
            name="password"
            placeholder="Password"
            required
          />

          <input
            type="password"
            name="confirm_password"
            placeholder="Confirm Password"
            required
          />

          <select name="role" required>
            <option value="" disabled selected>Select role</option>
            <option value="patient">Patient</option>
            <option value="doctor">Doctor</option>
          </select>

          <button type="submit">Register</button>
        </form>

        <p>Already have an account? <a href="/login.html">Login here</a></p>

        <div class="bottom-disclaimer">
          <strong>Disclaimer:</strong> This is a demo application for
          educational purposes only. It does not store or transmit any real user
          data and should not be used in a real medical setting.
        </div>
      </div>
    </div>
  </body>
</html>
