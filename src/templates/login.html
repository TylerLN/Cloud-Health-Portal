<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Login</title>
    <link rel="stylesheet" href="../static/login.css" />
  </head>

  <body>
    <div class="main-container">
      <div class="login">
        <h1>Medical Health Portal</h1>
        <img
          src="../static/cloud_logo.png"
          alt="Health Portal Logo"
          style="width: 150px; margin-bottom: 10px"
        />

        <h3>Enter your login credentials</h3>

        <form id="login-form" class="login-form">
          <input type="text" name="username" placeholder="Username" required />
          <input
            type="password"
            name="password"
            placeholder="Password"
            required
          />
          <button type="submit">Login</button>
        </form>

        <p id="error-message" style="color: red"></p>

        <p>Not registered? <a href="register.html">Register here</a></p>
      </div>

      <p class="disclaimer">
        <strong>Disclaimer:</strong> This is a demo application for educational
        purposes only. It does not store or transmit any real user data and
        should not be used in a real medical setting.
      </p>
    </div>

    <script src="../static/app.js"></script>
  </body>
</html>
